<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event_management_gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>

<body class="bg-white">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filterGallery(btn, cat) {
            document.querySelectorAll('#filterBtns .btn').forEach(b => { b.classList.remove('btn-primary'); b.classList.add('btn-outline-secondary'); });
            btn.classList.remove('btn-outline-secondary'); btn.classList.add('btn-primary');
            document.querySelectorAll('.gallery-item').forEach(item => { item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none'; });
        }
        function setCaption(t) { document.getElementById('cap').textContent = t; }
    </script>

</body>

</html>
