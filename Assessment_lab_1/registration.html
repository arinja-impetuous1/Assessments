<!DOCTYPE html>

<head>

<body class="bg-white">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function selectPlan(el) {
            document.querySelectorAll('#plans .card').forEach(c => { c.classList.remove('border-primary'); c.classList.add('border'); });
            el.classList.add('border-primary');
        }
    </script>
</body>
